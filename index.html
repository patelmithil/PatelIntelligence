<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXUS • Global Real-Time Intelligence Dashboard</title>

<!-- External Dependencies -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
/* ============================================================
   ROOT VARIABLES & RESET
   ============================================================ */
:root {
  --bg-primary: #060a13;
  --bg-secondary: #0c1220;
  --bg-surface: #111b2e;
  --bg-glass: rgba(12,18,32,0.82);
  --bg-glass-light: rgba(20,30,55,0.65);
  --accent-cyan: #00d4ff;
  --accent-red: #ff2d55;
  --accent-amber: #ffb400;
  --accent-blue: #3b82f6;
  --accent-green: #00e676;
  --accent-purple: #a855f7;
  --accent-orange: #ff6b35;
  --text-primary: #e8edf5;
  --text-secondary: #8b99b0;
  --text-muted: #4a5568;
  --border-color: rgba(255,255,255,0.06);
  --border-glow: rgba(0,212,255,0.15);
  --shadow-lg: 0 25px 50px rgba(0,0,0,0.5);
  --radius: 12px;
  --radius-sm: 8px;
  --radius-xs: 6px;
  --font-sans: 'Inter', -apple-system, sans-serif;
  --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
  --header-h: 56px;
  --filter-h: 48px;
  --stats-h: 52px;
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

html, body {
  height: 100%; overflow: hidden;
  font-family: var(--font-sans);
  background: var(--bg-primary);
  color: var(--text-primary);
  -webkit-font-smoothing: antialiased;
}

::-webkit-scrollbar { width:5px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.1); border-radius:10px; }
::-webkit-scrollbar-thumb:hover { background:rgba(255,255,255,0.2); }

/* ============================================================
   BOOT / INITIALIZATION SCREEN
   ============================================================ */
#boot-screen {
  position:fixed; inset:0; z-index:10000;
  background: var(--bg-primary);
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  transition: opacity 0.8s, visibility 0.8s;
}
#boot-screen.hidden { opacity:0; visibility:hidden; pointer-events:none; }

#boot-screen::before {
  content:''; position:absolute; inset:0;
  background: repeating-linear-gradient(
    0deg, transparent, transparent 2px,
    rgba(0,212,255,0.015) 2px, rgba(0,212,255,0.015) 4px
  );
  pointer-events:none; animation: scanlines 8s linear infinite;
}

@keyframes scanlines { 0%{transform:translateY(0)} 100%{transform:translateY(4px)} }

.boot-logo {
  font-family: var(--font-mono); font-size:42px; font-weight:700;
  color: var(--accent-cyan); letter-spacing:12px;
  text-shadow: 0 0 40px rgba(0,212,255,0.5), 0 0 80px rgba(0,212,255,0.2);
  margin-bottom:40px; position:relative;
}
.boot-logo::after {
  content:'INTELLIGENCE PLATFORM'; display:block;
  font-size:11px; letter-spacing:8px; color:var(--text-muted);
  text-shadow:none; margin-top:8px; text-align:center;
}

#boot-messages {
  font-family:var(--font-mono); font-size:12px;
  color:var(--accent-green); width:480px; max-width:90vw;
  min-height:180px;
}
#boot-messages .msg {
  opacity:0; transform:translateY(5px);
  animation: msgIn 0.3s forwards;
  margin-bottom:4px; line-height:1.7;
}
#boot-messages .msg::before { content:'› '; color:var(--text-muted); }
#boot-messages .msg.error { color:var(--accent-amber); }
#boot-messages .msg.success { color:var(--accent-cyan); }
@keyframes msgIn { to{opacity:1;transform:translateY(0)} }

#boot-progress {
  width:480px; max-width:90vw; height:2px;
  background:rgba(255,255,255,0.05); margin-top:24px;
  border-radius:2px; overflow:hidden;
}
#boot-progress-bar {
  height:100%; width:0; background: linear-gradient(90deg,var(--accent-cyan),var(--accent-green));
  transition: width 0.3s; border-radius:2px;
  box-shadow: 0 0 12px var(--accent-cyan);
}

/* ============================================================
   MAIN APP CONTAINER
   ============================================================ */
#app {
  display:none; height:100vh; width:100vw;
  flex-direction:column; overflow:hidden;
  opacity:0; transition: opacity 0.6s;
  background:
    radial-gradient(ellipse at 20% 50%, rgba(0,212,255,0.03) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 20%, rgba(168,85,247,0.03) 0%, transparent 60%),
    var(--bg-primary);
}
#app.visible { opacity:1; }

/* ============================================================
   HEADER
   ============================================================ */
header {
  height:var(--header-h); min-height:var(--header-h);
  display:flex; align-items:center; padding:0 16px; gap:12px;
  background: var(--bg-glass);
  border-bottom:1px solid var(--border-color);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  z-index:100; position:relative;
}
header::after {
  content:''; position:absolute; bottom:-1px; left:0; right:0; height:1px;
  background: linear-gradient(90deg, transparent, var(--accent-cyan), transparent);
  opacity:0.3;
}

.logo {
  font-family:var(--font-mono); font-weight:700; font-size:18px;
  color:var(--accent-cyan); letter-spacing:4px; margin-right:8px;
  display:flex; align-items:center; gap:10px; flex-shrink:0;
}
.logo-dot {
  width:8px; height:8px; background:var(--accent-cyan); border-radius:50%;
  box-shadow: 0 0 8px var(--accent-cyan);
  animation: pulse-dot 2s ease-in-out infinite;
}
@keyframes pulse-dot {
  0%,100%{opacity:1;transform:scale(1)}
  50%{opacity:0.5;transform:scale(0.8)}
}

.header-divider { width:1px; height:28px; background:var(--border-color); flex-shrink:0; }

.threat-level {
  display:flex; align-items:center; gap:8px;
  padding:4px 12px; border-radius:var(--radius-xs);
  font-size:11px; font-weight:600; letter-spacing:1px;
  font-family:var(--font-mono); flex-shrink:0;
}
.threat-level.elevated {
  background:rgba(255,180,0,0.1); color:var(--accent-amber);
  border:1px solid rgba(255,180,0,0.2);
}
.threat-level .tl-dot {
  width:6px;height:6px;border-radius:50%;
  background:var(--accent-amber);
  animation: pulse-dot 1.5s ease-in-out infinite;
}

.header-stats {
  display:flex; gap:16px; margin-left:auto; flex-shrink:0;
}
.header-stat {
  display:flex; flex-direction:column; align-items:flex-end;
  font-family:var(--font-mono);
}
.header-stat-label { font-size:9px; color:var(--text-muted); letter-spacing:1px; text-transform:uppercase; }
.header-stat-value { font-size:15px; font-weight:600; color:var(--text-primary); }

.clock {
  font-family:var(--font-mono); font-size:14px; font-weight:500;
  color:var(--accent-cyan); flex-shrink:0; letter-spacing:1px;
  display:flex; flex-direction:column; align-items:flex-end;
}
.clock-label { font-size:9px; color:var(--text-muted); letter-spacing:1px; }

/* ============================================================
   FILTER BAR
   ============================================================ */
.filter-bar {
  height:var(--filter-h); min-height:var(--filter-h);
  display:flex; align-items:center; padding:0 16px; gap:8px;
  background: rgba(12,18,32,0.6);
  border-bottom:1px solid var(--border-color);
  overflow-x:auto; flex-shrink:0;
}

.filter-btn {
  display:flex; align-items:center; gap:6px;
  padding:6px 14px; border-radius:20px;
  font-size:12px; font-weight:500;
  background:rgba(255,255,255,0.04);
  border:1px solid var(--border-color);
  color:var(--text-secondary); cursor:pointer;
  transition:all 0.2s; white-space:nowrap;
  font-family:var(--font-sans);
}
.filter-btn:hover { background:rgba(255,255,255,0.08); color:var(--text-primary); }
.filter-btn.active { border-color:var(--accent-cyan); color:var(--accent-cyan);
  background:rgba(0,212,255,0.08); box-shadow:0 0 12px rgba(0,212,255,0.1); }
.filter-btn.conflict.active { border-color:var(--accent-red); color:var(--accent-red);
  background:rgba(255,45,85,0.08); }
.filter-btn.weather.active { border-color:var(--accent-blue); color:var(--accent-blue);
  background:rgba(59,130,246,0.08); }
.filter-btn.economic.active { border-color:var(--accent-green); color:var(--accent-green);
  background:rgba(0,230,118,0.08); }
.filter-btn.breaking.active { border-color:var(--accent-amber); color:var(--accent-amber);
  background:rgba(255,180,0,0.08); }
.filter-btn.cyber.active { border-color:var(--accent-purple); color:var(--accent-purple);
  background:rgba(168,85,247,0.08); }

.filter-btn .count {
  font-size:10px; padding:1px 6px; border-radius:10px;
  background:rgba(255,255,255,0.1); font-family:var(--font-mono);
}

.search-box {
  margin-left:auto; display:flex; align-items:center; gap:8px;
  padding:6px 14px; border-radius:20px;
  background:rgba(255,255,255,0.04);
  border:1px solid var(--border-color);
  min-width:200px; transition:all 0.3s;
}
.search-box:focus-within { border-color:var(--accent-cyan); background:rgba(0,212,255,0.04); }
.search-box i { color:var(--text-muted); font-size:12px; }
.search-box input {
  border:none; background:none; outline:none;
  color:var(--text-primary); font-size:12px;
  font-family:var(--font-sans); width:100%;
}
.search-box input::placeholder { color:var(--text-muted); }

.severity-select {
  padding:6px 12px; border-radius:20px; font-size:12px;
  background:rgba(255,255,255,0.04);
  border:1px solid var(--border-color);
  color:var(--text-secondary); cursor:pointer;
  font-family:var(--font-sans); outline:none;
  appearance:none; -webkit-appearance:none;
}
.severity-select option { background:var(--bg-surface); }

/* ============================================================
   MAIN CONTENT LAYOUT
   ============================================================ */
.main-content {
  flex:1; display:flex; overflow:hidden; position:relative;
}

/* ============================================================
   MAP
   ============================================================ */
.map-wrap {
  flex:1; position:relative; min-width:0;
}
#map {
  width:100%; height:100%;
  background:var(--bg-primary);
}
/* Override leaflet for dark theme */
.leaflet-container { background:var(--bg-primary) !important; }
.leaflet-control-zoom { border:none !important; }
.leaflet-control-zoom a {
  background:var(--bg-glass) !important; color:var(--text-primary) !important;
  border:1px solid var(--border-color) !important;
  backdrop-filter:blur(12px) !important;
  width:32px !important; height:32px !important; line-height:32px !important;
  font-size:14px !important;
}
.leaflet-control-zoom a:hover { background:var(--bg-surface) !important; }
.leaflet-control-attribution { display:none !important; }

/* Custom map markers */
.event-marker {
  position:relative; cursor:pointer;
  transition: transform 0.2s;
}
.event-marker:hover { transform:scale(1.3); z-index:9999 !important; }

.marker-dot {
  width:14px; height:14px; border-radius:50%;
  border:2px solid; position:relative;
  box-shadow: 0 0 8px;
}
.marker-dot::after {
  content:''; position:absolute;
  top:-6px;left:-6px;right:-6px;bottom:-6px;
  border-radius:50%; border:1px solid; opacity:0.3;
  animation: marker-pulse 2s ease-out infinite;
}
@keyframes marker-pulse {
  0%{transform:scale(1);opacity:0.4}
  100%{transform:scale(2.2);opacity:0}
}

.marker-dot.conflict { border-color:var(--accent-red); background:rgba(255,45,85,0.6); box-shadow:0 0 8px rgba(255,45,85,0.5); }
.marker-dot.conflict::after { border-color:var(--accent-red); }
.marker-dot.breaking { border-color:var(--accent-amber); background:rgba(255,180,0,0.6); box-shadow:0 0 8px rgba(255,180,0,0.5); }
.marker-dot.breaking::after { border-color:var(--accent-amber); }
.marker-dot.weather { border-color:var(--accent-blue); background:rgba(59,130,246,0.6); box-shadow:0 0 8px rgba(59,130,246,0.5); }
.marker-dot.weather::after { border-color:var(--accent-blue); }
.marker-dot.economic { border-color:var(--accent-green); background:rgba(0,230,118,0.6); box-shadow:0 0 8px rgba(0,230,118,0.5); }
.marker-dot.economic::after { border-color:var(--accent-green); }
.marker-dot.cyber { border-color:var(--accent-purple); background:rgba(168,85,247,0.6); box-shadow:0 0 8px rgba(168,85,247,0.5); }
.marker-dot.cyber::after { border-color:var(--accent-purple); }
.marker-dot.health { border-color:var(--accent-orange); background:rgba(255,107,53,0.6); box-shadow:0 0 8px rgba(255,107,53,0.5); }
.marker-dot.health::after { border-color:var(--accent-orange); }

.marker-dot.severity-5 { width:20px; height:20px; }
.marker-dot.severity-4 { width:17px; height:17px; }

.marker-tooltip {
  position:absolute; bottom:calc(100% + 12px); left:50%;
  transform:translateX(-50%); padding:8px 12px;
  background:var(--bg-glass); backdrop-filter:blur(16px);
  border:1px solid var(--border-color); border-radius:var(--radius-xs);
  font-size:11px; white-space:nowrap; pointer-events:none;
  opacity:0; transition: opacity 0.2s;
  box-shadow:var(--shadow-lg);
  max-width:240px; white-space:normal;
}
.event-marker:hover .marker-tooltip { opacity:1; }
.marker-tooltip-title { font-weight:600; margin-bottom:2px; font-size:12px; }
.marker-tooltip-loc { color:var(--text-muted); font-size:10px; }

/* Map overlay info */
.map-overlay-info {
  position:absolute; top:12px; left:60px;
  z-index:1000; display:flex; gap:8px;
}
.map-info-badge {
  padding:5px 12px; border-radius:20px;
  background:var(--bg-glass); backdrop-filter:blur(12px);
  border:1px solid var(--border-color);
  font-size:11px; font-family:var(--font-mono);
  color:var(--text-secondary); display:flex; align-items:center; gap:6px;
}
.map-info-badge i { font-size:10px; }

/* ============================================================
   LIVE FEED PANEL
   ============================================================ */
.feed-panel {
  width:380px; min-width:380px;
  display:flex; flex-direction:column;
  background:var(--bg-glass);
  border-left:1px solid var(--border-color);
  backdrop-filter:blur(20px);
  position:relative; z-index:50;
}
.feed-header {
  padding:12px 16px; display:flex; align-items:center; gap:10px;
  border-bottom:1px solid var(--border-color); flex-shrink:0;
}
.feed-title {
  font-size:13px; font-weight:600; display:flex; align-items:center; gap:8px;
}
.feed-title .live-dot {
  width:6px;height:6px;border-radius:50%;
  background:var(--accent-red);
  animation: pulse-dot 1s ease-in-out infinite;
}
.feed-count {
  margin-left:auto; font-size:11px; color:var(--text-muted);
  font-family:var(--font-mono);
}
.feed-toggle {
  display:none; background:none; border:none; color:var(--text-secondary);
  cursor:pointer; font-size:16px; padding:4px;
}

.feed-list {
  flex:1; overflow-y:auto; padding:8px;
}

/* Feed items */
.feed-item {
  padding:12px; border-radius:var(--radius-sm);
  background:rgba(255,255,255,0.02);
  border:1px solid transparent;
  margin-bottom:6px; cursor:pointer;
  transition:all 0.25s; position:relative;
  animation: feedSlideIn 0.4s ease-out;
}
@keyframes feedSlideIn {
  from{opacity:0;transform:translateX(20px)}
  to{opacity:1;transform:translateX(0)}
}
.feed-item:hover {
  background:rgba(255,255,255,0.05);
  border-color:var(--border-color);
}
.feed-item.unread { border-left:2px solid var(--accent-cyan); }
.feed-item.critical { border-left:2px solid var(--accent-red); }

.feed-item-header { display:flex; align-items:center; gap:8px; margin-bottom:6px; }
.feed-item-cat {
  font-size:9px; font-weight:700; letter-spacing:1px;
  padding:2px 8px; border-radius:10px; text-transform:uppercase;
  font-family:var(--font-mono);
}
.feed-item-cat.conflict { background:rgba(255,45,85,0.15); color:var(--accent-red); }
.feed-item-cat.breaking { background:rgba(255,180,0,0.15); color:var(--accent-amber); }
.feed-item-cat.weather { background:rgba(59,130,246,0.15); color:var(--accent-blue); }
.feed-item-cat.economic { background:rgba(0,230,118,0.15); color:var(--accent-green); }
.feed-item-cat.cyber { background:rgba(168,85,247,0.15); color:var(--accent-purple); }
.feed-item-cat.health { background:rgba(255,107,53,0.15); color:var(--accent-orange); }

.feed-item-severity {
  font-size:9px; font-family:var(--font-mono); color:var(--text-muted);
  margin-left:auto;
}
.feed-item-severity.sev-5 { color:var(--accent-red); }
.feed-item-severity.sev-4 { color:var(--accent-amber); }

.feed-item-title { font-size:13px; font-weight:600; line-height:1.4; margin-bottom:6px; }
.feed-item-meta {
  display:flex; align-items:center; gap:10px;
  font-size:10px; color:var(--text-muted); font-family:var(--font-mono);
}
.feed-item-meta i { font-size:9px; }

.feed-item-bookmark {
  position:absolute; top:12px; right:12px;
  background:none; border:none; color:var(--text-muted);
  cursor:pointer; font-size:12px; opacity:0;
  transition:all 0.2s;
}
.feed-item:hover .feed-item-bookmark { opacity:1; }
.feed-item-bookmark.active { opacity:1; color:var(--accent-amber); }

/* ============================================================
   STATS BAR
   ============================================================ */
.stats-bar {
  height:var(--stats-h); min-height:var(--stats-h);
  display:flex; align-items:center; padding:0 16px; gap:24px;
  background:var(--bg-glass);
  border-top:1px solid var(--border-color);
  backdrop-filter:blur(20px); flex-shrink:0;
  overflow-x:auto;
}
.stat-item {
  display:flex; align-items:center; gap:8px;
  font-family:var(--font-mono); font-size:11px;
  color:var(--text-secondary); white-space:nowrap;
}
.stat-item .stat-icon {
  width:28px; height:28px; border-radius:var(--radius-xs);
  display:flex; align-items:center; justify-content:center;
  font-size:12px;
}
.stat-item .stat-icon.red { background:rgba(255,45,85,0.1); color:var(--accent-red); }
.stat-item .stat-icon.amber { background:rgba(255,180,0,0.1); color:var(--accent-amber); }
.stat-item .stat-icon.blue { background:rgba(59,130,246,0.1); color:var(--accent-blue); }
.stat-item .stat-icon.green { background:rgba(0,230,118,0.1); color:var(--accent-green); }
.stat-item .stat-icon.purple { background:rgba(168,85,247,0.1); color:var(--accent-purple); }
.stat-item .stat-icon.cyan { background:rgba(0,212,255,0.1); color:var(--accent-cyan); }

.stat-item .stat-val {
  font-size:16px; font-weight:700; color:var(--text-primary);
}
.stat-item .stat-label { font-size:9px; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.5px; }
.stat-item .stat-info { display:flex; flex-direction:column; }

.stat-sparkline { width:60px; height:24px; flex-shrink:0; }

.stats-divider { width:1px; height:28px; background:var(--border-color); flex-shrink:0; }

.stat-bar-mini { display:flex; gap:2px; align-items:flex-end; height:20px; }
.stat-bar-mini span {
  width:3px; background:var(--accent-cyan); border-radius:1px;
  opacity:0.6; transition: height 0.5s;
}

/* ============================================================
   DETAIL / EVENT PANEL (slide-in)
   ============================================================ */
.detail-overlay {
  position:fixed; inset:0; z-index:200;
  background:rgba(0,0,0,0.5);
  opacity:0; visibility:hidden;
  transition: opacity 0.3s, visibility 0.3s;
}
.detail-overlay.open { opacity:1; visibility:visible; }

.detail-panel {
  position:fixed; top:0; right:-520px; bottom:0; width:500px;
  max-width:100vw; z-index:201;
  background:var(--bg-secondary);
  border-left:1px solid var(--border-color);
  box-shadow: -20px 0 60px rgba(0,0,0,0.5);
  transition: right 0.35s cubic-bezier(0.4,0,0.2,1);
  display:flex; flex-direction:column;
  overflow:hidden;
}
.detail-panel.open { right:0; }

.detail-panel-header {
  padding:16px 20px; display:flex; align-items:center; gap:12px;
  border-bottom:1px solid var(--border-color);
  flex-shrink:0;
}
.detail-close {
  background:rgba(255,255,255,0.05); border:1px solid var(--border-color);
  color:var(--text-secondary); width:32px; height:32px;
  border-radius:var(--radius-xs); cursor:pointer; font-size:14px;
  display:flex; align-items:center; justify-content:center;
  transition:all 0.2s;
}
.detail-close:hover { background:rgba(255,255,255,0.1); color:var(--text-primary); }

.detail-panel-title { font-size:14px; font-weight:600; }

.detail-body { flex:1; overflow-y:auto; padding:20px; }

.detail-section { margin-bottom:24px; }
.detail-section-title {
  font-size:10px; font-weight:700; letter-spacing:1.5px;
  color:var(--text-muted); text-transform:uppercase;
  margin-bottom:10px; display:flex; align-items:center; gap:8px;
}
.detail-section-title i { font-size:10px; }

.detail-event-title { font-size:20px; font-weight:700; line-height:1.3; margin-bottom:8px; }
.detail-event-location {
  font-size:13px; color:var(--text-secondary);
  display:flex; align-items:center; gap:6px; margin-bottom:16px;
}
.detail-event-location i { color:var(--accent-cyan); }

.detail-meta-grid {
  display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:20px;
}
.detail-meta-card {
  padding:10px 12px; border-radius:var(--radius-xs);
  background:rgba(255,255,255,0.03);
  border:1px solid var(--border-color);
}
.detail-meta-card label {
  font-size:9px; color:var(--text-muted); text-transform:uppercase;
  letter-spacing:1px; font-family:var(--font-mono);
}
.detail-meta-card .val {
  font-size:14px; font-weight:600; margin-top:2px;
}

.detail-description {
  font-size:13px; line-height:1.8; color:var(--text-secondary);
  margin-bottom:16px;
}

.ai-summary-box {
  padding:16px; border-radius:var(--radius-sm);
  background: linear-gradient(135deg, rgba(0,212,255,0.05), rgba(168,85,247,0.05));
  border:1px solid rgba(0,212,255,0.15);
  position:relative; overflow:hidden;
}
.ai-summary-box::before {
  content:''; position:absolute; top:0; left:0; right:0; height:2px;
  background: linear-gradient(90deg, var(--accent-cyan), var(--accent-purple));
}
.ai-summary-header {
  display:flex; align-items:center; gap:8px;
  font-size:11px; font-weight:600; color:var(--accent-cyan);
  margin-bottom:10px;
}
.ai-summary-header i { font-size:14px; }
.ai-summary-text { font-size:13px; line-height:1.7; color:var(--text-secondary); }
.ai-cursor {
  display:inline-block; width:2px; height:14px;
  background:var(--accent-cyan); margin-left:2px;
  animation: blink 0.8s step-end infinite; vertical-align:middle;
}
@keyframes blink { 50%{opacity:0} }

.related-events { display:flex; flex-direction:column; gap:8px; }
.related-item {
  display:flex; align-items:center; gap:10px;
  padding:10px 12px; border-radius:var(--radius-xs);
  background:rgba(255,255,255,0.02);
  border:1px solid var(--border-color);
  cursor:pointer; transition:all 0.2s;
  font-size:12px;
}
.related-item:hover { background:rgba(255,255,255,0.05); }
.related-item .ri-dot { width:6px;height:6px;border-radius:50%;flex-shrink:0; }

.detail-actions {
  display:flex; gap:8px; padding:16px 20px;
  border-top:1px solid var(--border-color); flex-shrink:0;
}
.detail-actions button {
  flex:1; padding:10px; border-radius:var(--radius-xs);
  font-size:12px; font-weight:600; cursor:pointer;
  border:1px solid var(--border-color);
  background:rgba(255,255,255,0.04);
  color:var(--text-secondary);
  font-family:var(--font-sans);
  display:flex; align-items:center; justify-content:center; gap:6px;
  transition:all 0.2s;
}
.detail-actions button:hover { background:rgba(255,255,255,0.08); color:var(--text-primary); }
.detail-actions button.primary {
  background:rgba(0,212,255,0.1); color:var(--accent-cyan);
  border-color:rgba(0,212,255,0.2);
}

/* ============================================================
   NOTIFICATION TOASTS
   ============================================================ */
.toast-container {
  position:fixed; top:70px; right:16px; z-index:300;
  display:flex; flex-direction:column; gap:8px;
  max-width:360px; width:100%;
}
.toast {
  padding:12px 16px; border-radius:var(--radius-sm);
  background:var(--bg-glass); backdrop-filter:blur(20px);
  border:1px solid var(--border-color);
  box-shadow:var(--shadow-lg);
  display:flex; align-items:flex-start; gap:10px;
  animation: toastIn 0.4s cubic-bezier(0.4,0,0.2,1);
  cursor:pointer; transition:all 0.2s;
}
.toast:hover { transform:translateX(-4px); }
.toast.removing { animation: toastOut 0.3s forwards; }
@keyframes toastIn { from{opacity:0;transform:translateX(100%)} to{opacity:1;transform:translateX(0)} }
@keyframes toastOut { to{opacity:0;transform:translateX(100%)} }

.toast-icon {
  width:28px; height:28px; border-radius:var(--radius-xs);
  display:flex; align-items:center; justify-content:center;
  font-size:12px; flex-shrink:0;
}
.toast-icon.conflict { background:rgba(255,45,85,0.15); color:var(--accent-red); }
.toast-icon.breaking { background:rgba(255,180,0,0.15); color:var(--accent-amber); }
.toast-icon.weather { background:rgba(59,130,246,0.15); color:var(--accent-blue); }
.toast-icon.economic { background:rgba(0,230,118,0.15); color:var(--accent-green); }
.toast-icon.cyber { background:rgba(168,85,247,0.15); color:var(--accent-purple); }

.toast-content { flex:1; min-width:0; }
.toast-title { font-size:12px; font-weight:600; margin-bottom:2px; }
.toast-msg { font-size:11px; color:var(--text-secondary); line-height:1.4; }
.toast-time { font-size:9px; color:var(--text-muted); font-family:var(--font-mono); margin-top:4px; }
.toast-close {
  background:none; border:none; color:var(--text-muted);
  cursor:pointer; font-size:12px; padding:2px;
  transition: color 0.2s;
}
.toast-close:hover { color:var(--text-primary); }

/* ============================================================
   MOBILE FEED TOGGLE
   ============================================================ */
.mobile-feed-btn {
  display:none; position:fixed; bottom:70px; right:16px;
  z-index:150; width:48px; height:48px; border-radius:50%;
  background:var(--accent-cyan); color:var(--bg-primary);
  border:none; font-size:18px; cursor:pointer;
  box-shadow:0 4px 20px rgba(0,212,255,0.4);
  transition:all 0.2s;
}
.mobile-feed-btn:hover { transform:scale(1.1); }

/* ============================================================
   RESPONSIVE
   ============================================================ */
@media (max-width:900px) {
  .feed-panel {
    position:fixed; top:0; right:-100%; bottom:0; width:100%;
    max-width:380px; z-index:180;
    transition: right 0.3s cubic-bezier(0.4,0,0.2,1);
  }
  .feed-panel.mobile-open { right:0; }
  .feed-toggle { display:block !important; }
  .mobile-feed-btn { display:flex; align-items:center; justify-content:center; }
  .header-stats { display:none; }
  .header-divider:nth-child(4) { display:none; }
  .search-box { min-width:120px; }
  .map-overlay-info { left:12px; top:12px; }
  .detail-panel { width:100%; }
}

@media (max-width:600px) {
  .filter-bar { padding:0 8px; gap:4px; }
  .filter-btn { padding:5px 10px; font-size:11px; }
  .filter-btn span { display:none; }
  .search-box { min-width:100px; }
  .stats-bar { padding:0 8px; gap:12px; }
  .stat-sparkline { display:none; }
  header { padding:0 10px; }
  .logo { font-size:14px; letter-spacing:2px; }
  .clock { font-size:12px; }
}
</style>
</head>

function runBootSequence() {
  const msgContainer = document.getElementById('boot-messages');
  const progressBar = document.getElementById('boot-progress-bar');
  const total = BOOT_MESSAGES.length;

  BOOT_MESSAGES.forEach((msg, i) => {
    setTimeout(() => {
      const div = document.createElement('div');
      div.className = `msg ${msg.type}`;
      div.textContent = msg.text;
      div.style.animationDelay = '0s';
      msgContainer.appendChild(div);
      msgContainer.scrollTop = msgContainer.scrollHeight;
      progressBar.style.width = `${((i + 1) / total) * 100}%`;

      // Last message: transition to app
      if (i === total - 1) {
        setTimeout(() => {
          document.getElementById('boot-screen').classList.add('hidden');
          const app = document.getElementById('app');
          app.style.display = 'flex';
          requestAnimationFrame(() => app.classList.add('visible'));
          initApp();
        }, 1000);
      }
    }, msg.delay);
  });
}

/* ============================================================
   EVENT GENERATION ENGINE
   ============================================================ */
function generateEventId() {
  return `EVT-${String(++STATE.eventIdCounter).padStart(5, '0')}`;
}

function pickRandom(arr) {
  return arr[Math.floor(Math.random() * arr.length)];
}

function generateEvent(category) {
  if (!category) {
    const cats = ['conflict','breaking','weather','economic','cyber','health'];
    const weights = [20, 25, 20, 15, 12, 8]; // probability weights
    const total = weights.reduce((a, b) => a + b, 0);
    let r = Math.random() * total;
    for (let i = 0; i < cats.length; i++) {
      r -= weights[i];
      if (r <= 0) { category = cats[i]; break; }
    }
  }

  const loc = pickRandom(LOCATIONS);
  const template = pickRandom(EVENT_TEMPLATES[category]);
  const severity = template.s[Math.floor(Math.random() * template.s.length)];

  // Apply small random offset to prevent marker stacking
  const latOff = (Math.random() - 0.5) * 2;
  const lngOff = (Math.random() - 0.5) * 2;

  const title = template.t
    .replace('{loc}', loc.city)
    .replace('{country}', loc.country);

  const event = {
    id: generateEventId(),
    title: title,
    description: template.d,
    category: category,
    severity: severity,
    lat: loc.lat + latOff,
    lng: loc.lng + lngOff,
    city: loc.city,
    country: loc.country,
    region: loc.region,
    location: `${loc.city}, ${loc.country}`,
    source: pickRandom(SOURCES),
    timestamp: new Date(),
    aiSummary: generateAISummary(title, category, severity, loc),
    bookmarked: false,
  };

  return event;
}

function generateAISummary(title, category, severity, loc) {
  const risk = severity >= 4 ? 'HIGH RISK' : severity >= 3 ? 'MODERATE RISK' : 'LOW RISK';
  const summaries = [
    `[${risk}] This ${category} event in ${loc.region} requires attention. Key stakeholders in the ${loc.country} area should monitor developments closely. Potential for escalation exists based on historical patterns in the region. Recommend enhanced monitoring of related intelligence streams.`,
    `[${risk}] NEXUS AI assesses this situation as significant for regional stability. The incident in ${loc.city} follows a pattern of similar events over the past 30 days. Cross-referencing with OSINT feeds indicates possible connection to broader geopolitical dynamics.`,
    `[${risk}] Analysis indicates this event could impact operations in ${loc.country} and neighboring regions. Severity assessment based on multiple indicators including historical data, current geopolitical context, and source reliability scoring.`,
  ];
  return pickRandom(summaries);
}

/* ============================================================
   MARKER MANAGEMENT
   ============================================================ */
function createMarkerElement(event) {
  const el = document.createElement('div');
  el.className = 'event-marker';
  el.innerHTML = `
    <div class="marker-dot ${event.category} severity-${event.severity}"></div>
    <div class="marker-tooltip">
      <div class="marker-tooltip-title">${event.title}</div>
      <div class="marker-tooltip-loc"><i class="fas fa-map-pin"></i> ${event.location}</div>
    </div>
  `;
  return el;
}

function addMarker(event) {
  const el = createMarkerElement(event);
  const icon = L.divIcon({
    html: el.outerHTML,
    className: '',
    iconSize: [20, 20],
    iconAnchor: [10, 10],
  });

  const marker = L.marker([event.lat, event.lng], { icon: icon })
    .addTo(STATE.map)
    .on('click', () => openDetail(event.id));

  STATE.markers[event.id] = marker;
}

function removeMarker(eventId) {
  if (STATE.markers[eventId]) {
    STATE.map.removeLayer(STATE.markers[eventId]);
    delete STATE.markers[eventId];
  }
}

function refreshMapMarkers() {
  // Remove all existing markers
  Object.values(STATE.markers).forEach(m => STATE.map.removeLayer(m));
  STATE.markers = {};

  // Add markers for filtered events
  getFilteredEvents().forEach(evt => addMarker(evt));

  // Update marker count badge
  const count = Object.keys(STATE.markers).length;
  document.getElementById('marker-count').textContent = `${count} markers`;
}

/* ============================================================
   FEED MANAGEMENT
   ============================================================ */
function renderFeedItem(event) {
  const ago = timeAgo(event.timestamp);
  const sevClass = event.severity >= 5 ? 'sev-5' : event.severity >= 4 ? 'sev-4' : '';
  const critClass = event.severity >= 5 ? 'critical' : 'unread';
  const bmClass = STATE.bookmarks.has(event.id) ? 'active' : '';

  return `
    <div class="feed-item ${critClass}" data-id="${event.id}" onclick="openDetail('${event.id}')">
      <button class="feed-item-bookmark ${bmClass}" onclick="event.stopPropagation();toggleBookmark('${event.id}')">
        <i class="${STATE.bookmarks.has(event.id) ? 'fas' : 'far'} fa-bookmark"></i>
      </button>
      <div class="feed-item-header">
        <span class="feed-item-cat ${event.category}">${event.category.toUpperCase()}</span>
        <span class="feed-item-severity ${sevClass}">SEV ${event.severity}</span>
      </div>
      <div class="feed-item-title">${event.title}</div>
      <div class="feed-item-meta">
        <span><i class="fas fa-map-pin"></i> ${event.location}</span>
        <span><i class="far fa-clock"></i> ${ago}</span>
        <span><i class="fas fa-rss"></i> ${event.source}</span>
      </div>
    </div>
  `;
}

function refreshFeed() {
  const feedList = document.getElementById('feed-list');
  const filtered = getFilteredEvents();
  const sorted = filtered.sort((a, b) => b.timestamp - a.timestamp);
  feedList.innerHTML = sorted.map(renderFeedItem).join('');
  document.getElementById('feed-count').textContent = `${sorted.length} events`;
}

/* ============================================================
   FILTERING
   ============================================================ */
function getFilteredEvents() {
  return STATE.events.filter(evt => {
    // Category filter
    if (STATE.activeFilter !== 'all' && evt.category !== STATE.activeFilter) return false;
    // Severity filter
    if (STATE.severityFilter > 0 && evt.severity < STATE.severityFilter) return false;
    // Search filter
    if (STATE.searchQuery) {
      const q = STATE.searchQuery.toLowerCase();
      const searchable = `${evt.title} ${evt.location} ${evt.country} ${evt.category} ${evt.source}`.toLowerCase();
      if (!searchable.includes(q)) return false;
    }
    return true;
  });
}

function toggleFilter(filter) {
  STATE.activeFilter = filter;
  // Update UI
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.filter === filter);
  });
  applyFilters();
}

function applyFilters() {
  STATE.severityFilter = parseInt(document.getElementById('severity-filter').value);
  STATE.searchQuery = document.getElementById('search-input').value;
  refreshFeed();
  refreshMapMarkers();
}

  const counts = {conflict:0, breaking:0, weather:0, economic:0, cyber:0, health:0};

  let critical = 0;

  STATE.events.forEach(e => {

  // Header stats
  document.getElementById('stat-total').textContent = STATE.events.length;
  document.getElementById('stat-countries').textContent = countries.size;
  document.getElementById('stat-critical').textContent = critical;

  // Filter counts
  document.getElementById('count-all').textContent = STATE.events.length;
  document.getElementById('count-conflict').textContent = counts.conflict;
  document.getElementById('count-breaking').textContent = counts.breaking;
  document.getElementById('count-weather').textContent = counts.weather;
  document.getElementById('count-economic').textContent = counts.economic;
  document.getElementById('count-cyber').textContent = counts.cyber;

  // Stats bar
  document.getElementById('sbar-conflict').textContent = counts.conflict;
  document.getElementById('sbar-breaking').textContent = counts.breaking;
  document.getElementById('sbar-weather').textContent = counts.weather;
  document.getElementById('sbar-economic').textContent = counts.economic;
  document.getElementById('sbar-cyber').textContent = counts.cyber;

  // Update sparkline data
  ['conflict','breaking','weather','economic','cyber'].forEach(cat => {
    STATE.sparkData[cat].push(counts[cat]);
    if (STATE.sparkData[cat].length > CONFIG.SPARKLINE_POINTS) {
      STATE.sparkData[cat].shift();
    }
    drawSparkline(`spark-${cat}`, STATE.sparkData[cat], CATEGORY_COLORS[cat]);
  });

  // Activity bars
  updateActivityBars();

  // Threat level
  updateThreatLevel(critical, STATE.events.length);
}

function drawSparkline(canvasId, data, color) {
  const canvas = document.getElementById(canvasId);
  if (!canvas || data.length < 2) return;

  const ctx = canvas.getContext('2d');
  const w = canvas.width;
  const h = canvas.height;
  const padding = 2;

  ctx.clearRect(0, 0, w, h);

  const max = Math.max(...data, 1);
  const min = 0;
  const range = max - min || 1;
  const step = (w - padding * 2) / (data.length - 1);

  // Draw line
  ctx.beginPath();
  ctx.strokeStyle = color;
  ctx.lineWidth = 1.5;
  ctx.lineJoin = 'round';

  data.forEach((val, i) => {
    const x = padding + i * step;
    const y = h - padding - ((val - min) / range) * (h - padding * 2);
    if (i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  });
  ctx.stroke();

  // Fill gradient
  const lastX = padding + (data.length - 1) * step;
  const lastY = h - padding - ((data[data.length - 1] - min) / range) * (h - padding * 2);
  ctx.lineTo(lastX, h);
  ctx.lineTo(padding, h);
  ctx.closePath();

  const gradient = ctx.createLinearGradient(0, 0, 0, h);
  gradient.addColorStop(0, color + '33');
  gradient.addColorStop(1, color + '00');
  ctx.fillStyle = gradient;
  ctx.fill();

  // End dot
  ctx.beginPath();
  ctx.arc(lastX, lastY, 2, 0, Math.PI * 2);
  ctx.fillStyle = color;
  ctx.fill();
}

function updateActivityBars() {
  const container = document.getElementById('activity-bars');
  if (!container.children.length) {
    for (let i = 0; i < 12; i++) {
      const span = document.createElement('span');
      container.appendChild(span);
    }
  }
  Array.from(container.children).forEach(bar => {
    bar.style.height = (3 + Math.random() * 17) + 'px';
  });
}

function updateThreatLevel(critical, total) {
  const el = document.getElementById('threat-level');
  const textEl = document.getElementById('threat-text');
  const ratio = total > 0 ? critical / total : 0;

  el.classList.remove('elevated','high','severe','guarded');
  if (ratio > 0.15 || critical > 8) {
    textEl.textContent = 'SEVERE'; el.classList.add('severe');
    el.style.borderColor = 'rgba(255,45,85,0.3)'; el.style.background = 'rgba(255,45,85,0.08)';
    el.style.color = 'var(--accent-red)';
    el.querySelector('.tl-dot').style.background = 'var(--accent-red)';
  } else if (ratio > 0.08 || critical > 4) {
    textEl.textContent = 'HIGH'; el.classList.add('high');
    el.style.borderColor = 'rgba(255,107,53,0.3)'; el.style.background = 'rgba(255,107,53,0.08)';
    el.style.color = 'var(--accent-orange)';
    el.querySelector('.tl-dot').style.background = 'var(--accent-orange)';
  } else {
    textEl.textContent = 'ELEVATED'; el.classList.add('elevated');
    el.style.borderColor = 'rgba(255,180,0,0.3)'; el.style.background = 'rgba(255,180,0,0.08)';
    el.style.color = 'var(--accent-amber)';
    el.querySelector('.tl-dot').style.background = 'var(--accent-amber)';
  }
}

/* ============================================================
   UTILITY FUNCTIONS
   ============================================================ */
function timeAgo(date) {
  const seconds = Math.floor((new Date() - date) / 1000);
  if (seconds < 10) return 'just now';
  if (seconds < 60) return `${seconds}s ago`;
  const minutes = Math.floor(seconds / 60);
  if (minutes < 60) return `${minutes}m ago`;
  const hours = Math.floor(minutes / 60);
  if (hours < 24) return `${hours}h ago`;
  return `${Math.floor(hours / 24)}d ago`;
}

function formatTime(date) {
  return date.toISOString().replace('T', ' ').substring(0, 19) + ' UTC';
}

function updateClock() {
  const now = new Date();
  const h = String(now.getUTCHours()).padStart(2,'0');
  const m = String(now.getUTCMinutes()).padStart(2,'0');
  const s = String(now.getUTCSeconds()).padStart(2,'0');
  document.getElementById('clock-time').textContent = `${h}:${m}:${s}`;
}

/* ============================================================
   MOBILE FEED TOGGLE
   ============================================================ */
function toggleMobileFeed() {
  document.getElementById('feed-panel').classList.toggle('mobile-open');
}

/* ============================================================
   REAL-TIME UPDATE ENGINE
   ============================================================ */
function addNewEvent() {
  const event = generateEvent();
  STATE.events.unshift(event);

  // Enforce max events limit
  while (STATE.events.length > CONFIG.MAX_EVENTS) {
    const removed = STATE.events.pop();
    removeMarker(removed.id);
  }

  // Update UI
  refreshFeed();
  refreshMapMarkers();
  updateStats();

  // Show notification for high severity events
  if (event.severity >= 4) {
    showToast({
      title: `${event.category.toUpperCase()} ALERT — SEV ${event.severity}`,
      msg: event.title,
      category: event.category,
    });
  }
}

function startRealTimeUpdates() {
  // Add new events periodically
  setInterval(() => {
    addNewEvent();
  }, CONFIG.UPDATE_INTERVAL);

  // Refresh timestamps in feed every 30 seconds
  setInterval(() => {
    refreshFeed();
  }, 30000);

  // Update clock every second
  setInterval(updateClock, 1000);
  updateClock();

  // Activity bars animation
  setInterval(updateActivityBars, 2000);
}

/* ============================================================
   APPLICATION INITIALIZATION
   ============================================================ */
function initApp() {
  // Initialize the map
  initMap();

  // Generate initial events
  for (let i = 0; i < 35; i++) {
    const event = generateEvent();
    // Stagger timestamps for realistic look
    event.timestamp = new Date(Date.now() - Math.random() * 3600000 * 4);
    STATE.events.push(event);
  }

  // Sort by timestamp (newest first)
  STATE.events.sort((a, b) => b.timestamp - a.timestamp);

  // Initial render
  refreshFeed();
  refreshMapMarkers();
  updateStats();

  // Start real-time updates
  startRealTimeUpdates();

  // Keyboard shortcut: Escape closes detail panel
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') closeDetail();
  });

  console.log('%c[NEXUS] System initialized successfully', 'color:#00d4ff;font-weight:bold');
}

/* ============================================================
   START BOOT ON PAGE LOAD
   ============================================================ */
window.addEventListener('DOMContentLoaded', runBootSequence);
</script>
